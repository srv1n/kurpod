name: Auto Version and Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.github/**'
      - 'docs/**'

permissions:
  contents: write

jobs:
  version-and-release:
    name: Auto Version and Create Release
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, '[skip-release]')"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: current_version
        run: |
          if git tag --list | grep -q "v"; then
            CURRENT_VERSION=$(git describe --tags --abbrev=0 | sed 's/v//')
          else
            CURRENT_VERSION="0.0.0"
          fi
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: version_bump
        run: |
          # Check commit messages since last tag for version bump indicators
          if git tag --list | grep -q "v"; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            COMMITS=$(git log --oneline $LAST_TAG..HEAD)
          else
            COMMITS=$(git log --oneline)
          fi
          
          # Default to patch bump
          BUMP_TYPE="patch"
          
          # Check for breaking changes or major version indicators
          if echo "$COMMITS" | grep -E "(BREAKING CHANGE|breaking change|\[major\])" > /dev/null; then
            BUMP_TYPE="major"
          # Check for new features or minor version indicators
          elif echo "$COMMITS" | grep -E "(feat:|feature:|add:|new:|enhancement:|\[minor\])" > /dev/null; then
            BUMP_TYPE="minor"
          # Check for bug fixes or patch version indicators  
          elif echo "$COMMITS" | grep -E "(fix:|bugfix:|patch:|hotfix:|\[patch\])" > /dev/null; then
            BUMP_TYPE="patch"
          fi
          
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT="${{ steps.current_version.outputs.current }}"
          BUMP_TYPE="${{ steps.version_bump.outputs.bump_type }}"
          
          IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Check if version already exists
        id: check_version
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          if git tag --list | grep -q "v$NEW_VERSION"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$NEW_VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$NEW_VERSION does not exist"
          fi

      - name: Update Cargo.toml versions
        if: steps.check_version.outputs.exists == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          
          # Update workspace version
          sed -i "s/version = \".*\"/version = \"$NEW_VERSION\"/" Cargo.toml
          
          # Update kurpod_server version
          sed -i "s/version = \".*\"/version = \"$NEW_VERSION\"/" kurpod_server/Cargo.toml
          
          # Update encryption_core version
          sed -i "s/version = \".*\"/version = \"$NEW_VERSION\"/" encryption_core/Cargo.toml

      - name: Update frontend package.json version
        if: steps.check_version.outputs.exists == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          cd frontend
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" package.json

      - name: Commit version updates
        if: steps.check_version.outputs.exists == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Cargo.toml kurpod_server/Cargo.toml encryption_core/Cargo.toml frontend/package.json
          git commit -m "chore: bump version to v$NEW_VERSION [skip-release]"
          git push

      - name: Create and push tag
        if: steps.check_version.outputs.exists == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

      - name: Summary
        run: |
          if [ "${{ steps.check_version.outputs.exists }}" == "false" ]; then
            echo "🚀 Version bumped from ${{ steps.current_version.outputs.current }} to ${{ steps.new_version.outputs.version }}"
            echo "📝 Bump type: ${{ steps.version_bump.outputs.bump_type }}"
            echo "🏷️ Tagged as: v${{ steps.new_version.outputs.version }}"
            echo "📦 Release workflow will be triggered automatically"
          else
            echo "ℹ️ Version ${{ steps.new_version.outputs.version }} already exists, skipping release"
          fi