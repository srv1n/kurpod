name: Simple Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          if [ $(git tag --list | wc -l) -eq 1 ]; then
            # First release - include all commits
            cat << EOF > changelog.md
          ## 🎉 Initial Release v${{ steps.get_version.outputs.version }}

          First release of KURPOD Server - a secure encrypted file storage solution!

          ### ✨ Features
          - **🔒 Military-grade encryption** using XChaCha20-Poly1305 + Argon2id
          - **🎭 Plausible deniability** with dual volume support (standard + hidden)
          - **🌐 Web interface** for easy file management from any device
          - **📦 Single binary** - no complex installation required
          - **🚀 Cross-platform** support (Linux, macOS, Windows)

          ### 📥 Download Instructions
          1. Download the appropriate binary for your platform below
          2. Extract the archive: \`tar -xzf kurpod_server-*.tar.gz\`
          3. Run the server: \`./kurpod_server\`
          4. Open your browser to \`http://localhost:3000\`

          ### 📋 Available Platforms
          - **Linux x86_64** (most common Linux systems)
          - **macOS** (Intel and Apple Silicon)
          - **Windows x86_64** (64-bit Windows)

          ⚠️ **Note**: Limited platform builds due to GitHub Actions constraints on private repos.
          For additional platforms, please build from source or make the repo public.
          EOF
          else
            # Get previous tag
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1)
            cat << EOF > changelog.md
          ## 🚀 What's Changed in v${{ steps.get_version.outputs.version }}

          ### 📝 Changes Since $PREV_TAG
          EOF
            git log --oneline --pretty=format:"- %s" $PREV_TAG..HEAD | head -20 >> changelog.md
            cat << EOF >> changelog.md

          ### 📥 Download Instructions
          1. Download the appropriate binary for your platform below
          2. Extract: \`tar -xzf kurpod_server-*.tar.gz\`
          3. Run: \`./kurpod_server\`

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}
          EOF
          fi
          
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "KURPOD Server ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false
          generate_release_notes: false

  build-and-upload:
    name: Build and Upload (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Only build the most common platforms to save Actions minutes
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-20.04
            name: linux-amd64
          - target: x86_64-apple-darwin
            os: macos-12
            name: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-12
            name: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            name: windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: |
          cd frontend
          bun install --frozen-lockfile
          bun run build

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} -p kurpod_server
        env:
          CARGO_TARGET_DIR: target

      - name: Prepare Windows release asset
        if: runner.os == 'Windows'
        run: |
          mkdir release-assets
          copy "target\${{ matrix.target }}\release\kurpod_server.exe" "release-assets\"
          cd release-assets
          7z a "kurpod-v${{ needs.create-release.outputs.version }}-${{ matrix.name }}.zip" kurpod_server.exe
          echo "ASSET_PATH=release-assets/kurpod-v${{ needs.create-release.outputs.version }}-${{ matrix.name }}.zip" >> $env:GITHUB_ENV

      - name: Prepare Unix release asset
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-assets
          cp target/${{ matrix.target }}/release/kurpod_server release-assets/
          cd release-assets
          
          # Create README for the release
          cat << EOF > README.txt
          KURPOD Server v${{ needs.create-release.outputs.version }} - ${{ matrix.name }}
          
          ## Quick Start
          1. Extract this archive
          2. Run: ./kurpod_server
          3. Open browser: http://localhost:3000
          
          ## Documentation
          https://github.com/${{ github.repository }}
          
          ## License
          AGPLv3 - Free for personal use, commercial licensing available
          EOF
          
          tar -czf kurpod-v${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz kurpod_server README.txt
          echo "ASSET_PATH=release-assets/kurpod-v${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz" >> $GITHUB_ENV

      - name: Upload release binary
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ASSET_PATH }} 