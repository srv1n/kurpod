name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test --workspace --exclude enc_tauri

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run clippy
        run: cargo clippy --workspace --exclude enc_tauri -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-13
          - target: x86_64-pc-windows-msvc
            os: windows-2022
          - target: aarch64-pc-windows-msvc
            os: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install bun
        uses: oven-sh/setup-bun@v2
      
      - name: Build frontend
        run: |
          cd frontend
          bun install
          bun run build
      
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} -p enc_server
      
      # macOS code signing
      - name: Import Code-Signing Certificates (macOS)
        if: runner.os == 'macOS'
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
      
      - name: Sign macOS binary
        if: runner.os == 'macOS'
        run: |
          codesign --force --sign "${{ secrets.APPLE_DEVELOPER_CERTIFICATE_ID }}" \
            --options runtime \
            --entitlements .github/entitlements.plist \
            target/${{ matrix.target }}/release/enc_server
          
          # Verify the signature
          codesign --verify --verbose target/${{ matrix.target }}/release/enc_server
      
      # Windows code signing
      - name: Sign Windows binary
        if: runner.os == 'Windows' && secrets.WINDOWS_CERTIFICATE != ''
        run: |
          # Decode certificate from base64
          echo "${{ secrets.WINDOWS_CERTIFICATE }}" | base64 -d > cert.p12
          
          # Sign the binary
          signtool sign /f cert.p12 /p "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 "target/${{ matrix.target }}/release/enc_server.exe"
          
          # Verify signature
          signtool verify /pa "target/${{ matrix.target }}/release/enc_server.exe"
          
          # Clean up certificate file
          rm cert.p12
      
      # Linux GPG signing
      - name: Sign Linux binary with GPG
        if: runner.os == 'Linux'
        run: |
          # Import GPG key
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          
          # Sign the binary (creates .sig file)
          gpg --armor --detach-sign --local-user "${{ secrets.GPG_KEY_ID }}" "target/${{ matrix.target }}/release/enc_server"
          
          # Verify signature
          gpg --verify "target/${{ matrix.target }}/release/enc_server.asc" "target/${{ matrix.target }}/release/enc_server"
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: enc_server-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/enc_server${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || matrix.target == 'aarch64-pc-windows-msvc' && '.exe' || '' }}